version: "3.9"

services:
  # ── Redis: Distributed Pub/Sub Message Broker ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taskboard_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend: FastAPI + WebSockets ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskboard_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/data/taskboard.db
    volumes:
      - sqlite_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  sqlite_data:

networks:
  default:
    name: taskboard_network
