app = "taskboard-pdc"
primary_region = "sin"  # Singapore — closest to Philippines

[build]

[env]
  DB_PATH = "/data/taskboard.db"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "taskboard_data"
  destination = "/data"
