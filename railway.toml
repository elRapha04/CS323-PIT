[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "cd /app/backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/api/stats"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "backend"
